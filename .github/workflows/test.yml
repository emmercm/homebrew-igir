name: Test Formula

on:
  pull_request:
    types:
      # - edited  # PR's base branch was changed
      - opened
      - reopened
      - synchronize  # PR's branch was edited (i.e. new commits)
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref (refs/heads/<branch>, refs/tags/<tag>, etc.) or SHA'
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ref: ${{ inputs.ref || github.sha || github.ref }}

jobs:
  brew-install:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: ubuntu-24.04-arm
          - os: macos-15-intel
          - os: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.ref }}
      - uses: Homebrew/actions/setup-homebrew@master

      - if: runner.os == 'macOS'
        run: |
          brew install --build-from-source bubblewrap
      - if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes bubblewrap
          sudo sysctl -w kernel.unprivileged_userns_clone=1
          sudo sysctl -w user.max_user_namespaces=28633
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true

      - run: |
          brew tap test/igir "$(pwd)"
          brew install --debug --verbose --formula --build-from-source "test/igir/igir"
          igir --help
  
  # !!! This check should be required by GitHub !!!
  test-status-check:
    if: always()
    needs:
      - brew-install
    runs-on: ubuntu-latest
    steps:
      - uses: re-actors/alls-green@release/v1
        with:
          allowed-skips: node-lint, node-unit, node-e2e, node-build, node-package
          jobs: ${{ toJSON(needs) }}
